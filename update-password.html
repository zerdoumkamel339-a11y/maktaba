<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث كلمة المرور - BookDZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        #errorMessage {
            color: var(--accent);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1 style="text-align:center; color: var(--primary); margin-bottom: 10px;">BookDZ</h1>
        <p style="text-align:center; color: var(--text-secondary); margin-bottom: 30px;">تعيين كلمة سر جديدة</p>

        <div class="form-group">
            <label>كلمة المرور الجديدة</label>
            <input type="password" id="newPass" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label>تأكيد كلمة المرور</label>
            <input type="password" id="confirmPass" placeholder="••••••••">
        </div>

        <button class="btn-submit" id="updateBtn" onclick="handleUpdatePassword()">تحديث كلمة المرور <i
                class="fas fa-key"></i></button>
        <div id="errorMessage"></div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:1000; justify-content:center; align-items:center;">
            <div style="text-align:center;">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:var(--primary);"></i>
                <p style="margin-top:10px; font-weight:700;">جاري التحديث...</p>
            </div>
        </div>
    </div>

    <script>
        // التحقق من الجلسة (يجب أن يكون المستخدم قد وصل عبر رابط إعادة التعيين)
        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.sb) return;
            const { data: { session } } = await window.sb.auth.getSession();
            if (!session) {
                alert("انتهت صلاحية الجلسة أو الرابط غير صحيح. يرجى طلب رابط جديد.");
                window.location.href = "login.html";
            }
        });

        async function handleUpdatePassword() {
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const errorEl = document.getElementById('errorMessage');
            const loader = document.getElementById('loadingOverlay');
            const btn = document.getElementById('updateBtn');

            if (!newPass || !confirmPass) { alert('يرجى ملء كافة الحقول!'); return; }
            if (newPass !== confirmPass) { alert('كلمتا المرور غير متطابقتين!'); return; }
            if (newPass.length < 6) { alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل!'); return; }

            try {
                btn.disabled = true;
                loader.style.display = 'flex';
                errorEl.style.display = 'none';

                const { error } = await window.sb.auth.updateUser({ password: newPass });

                if (error) throw error;

                alert("تم تحديث كلمة المرور بنجاح! يمكنك الآن تسجيل الدخول.");
                window.location.href = "login.html";

            } catch (err) {
                loader.style.display = 'none';
                errorEl.innerText = "حدث خطأ: " + err.message;
                errorEl.style.display = 'block';
                console.error(err);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>

</html>

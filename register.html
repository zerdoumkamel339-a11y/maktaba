<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - BookDZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="algeria_cities.js"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-main);
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .register-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 550px;
            margin: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .switch-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.95rem;
        }

        .switch-text a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-card {
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .role-card i {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .role-card.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .role-card.active i {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="register-card">
        <h1 style="text-align:center; color: var(--primary);">إنشاء حساب جديد</h1>
        <p style="text-align:center; color: var(--text-secondary); margin-bottom: 30px;">اختر نوع الحساب وأكمل بياناتك
        </p>

        <div class="role-selector">
            <div class="role-card active" id="role-user" onclick="selectRole('user', this)"><i class="fas fa-user"></i><br>مشتري</div>
            <div class="role-card" id="role-individual" onclick="selectRole('individual', this)"><i class="fas fa-user-tag"></i><br>بائع فردي</div>
            <div class="role-card" id="role-publisher" onclick="selectRole('publisher', this)"><i class="fas fa-building"></i><br>دار نشر</div>
            <div class="role-card" onclick="window.location.href='register_library.html'"><i class="fas fa-store"></i><br>مكتبة</div>
        </div>

        <div id="registrationForm">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="regName" placeholder="أدخل اسمك الكامل">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="regEmail" placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="regPhone" placeholder="0555000000">
            </div>

            <div class="form-group" id="locationGroup" style="display:none;">
                <label>الولاية</label>
                <select id="regState" onchange="updateMunis()">
                    <option value="">-- اختر الولاية --</option>
                </select>
                <label style="margin-top:15px;" id="muniLabel" style="display:none;">البلدية</label>
                <select id="regMuni" style="display:none; margin-top:8px;">
                    <option value="">-- اختر البلدية --</option>
                </select>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="regPass" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <input type="password" id="regPassConfirm" placeholder="••••••••">
            </div>

            <button class="btn-submit" id="regBtn" onclick="handleRegister()">انضم الآن <i
                    class="fas fa-user-plus"></i></button>
        </div>

        <div id="loadingOverlay"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:1000; justify-content:center; align-items:center;">
            <div style="text-align:center;">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:var(--primary);"></i>
                <p style="margin-top:10px; font-weight:700;">جاري إنشاء الحساب...</p>
            </div>
        </div>

        <div class="switch-text">
            لديك حساب بالفعل؟ <a href="login.html">سجل دخولك</a>
        </div>
    </div>

    <script>
        // 1. المتغير الأساسي لتتبع الرتبة المختارة
        let currentRole = 'user'; // القيمة الافتراضية
        let wilayas = [];

        function selectRole(role, el) {
            currentRole = role; // تحديث المتغير
            // تحديث التصميم المرئي
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            // إظهار/إخفاء حقل الموقع
            const locGroup = document.getElementById('locationGroup');
            locGroup.style.display = (role === 'individual' || role === 'publisher') ? 'block' : 'none';
        }

        async function initStates() {
            const select = document.getElementById('regState');
            try {
                const { data, error } = await sb.from('wilayas').select('*').order('id', { ascending: true });
                if (!error && data && data.length > 0) {
                    wilayas = data;
                } else if (typeof algeriaWilayas !== 'undefined') {
                    wilayas = algeriaWilayas;
                }
            } catch (e) {
                if (typeof algeriaWilayas !== 'undefined') wilayas = algeriaWilayas;
            }

            select.innerHTML = '<option value="">-- اختر الولاية --</option>' +
                wilayas.map(w => `<option value="${w.id}">${w.id} - ولاية ${w.name}</option>`).join('');
        }

        async function updateMunis() {
            const stateId = document.getElementById('regState').value;
            const select = document.getElementById('regMuni');
            const label = document.getElementById('muniLabel');

            if (!stateId) { select.style.display = 'none'; if (label) label.style.display = 'none'; return; }

            select.style.display = 'block';
            if (label) label.style.display = 'block';
            select.innerHTML = '<option value="">جاري التحميل...</option>';

            let communes = [];
            const { data, error } = await sb.from('communes').select('name').eq('wilaya_id', stateId);
            if (!error && data && data.length > 0) {
                communes = data.map(c => c.name);
            } else if (typeof algeriaWilayas !== 'undefined') {
                const found = algeriaWilayas.find(w => w.id == stateId);
                if (found) communes = found.communes;
            }

            select.innerHTML = '<option value="">-- اختر البلدية --</option>' +
                communes.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            const passConfirm = document.getElementById('regPassConfirm').value;
            const phone = document.getElementById('regPhone').value;
            const stateId = document.getElementById('regState').value;
            const muni = document.getElementById('regMuni').value;
            const loader = document.getElementById('loadingOverlay');
            const btn = document.getElementById('regBtn');

            if (!name || !email || !pass || !passConfirm) { alert('يرجى ملء كافة البيانات الأساسية!'); return; }
            if (pass !== passConfirm) { alert('كلمات المرور غير متطابقة!'); return; }
            if (pass.length < 6) { alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل!'); return; }

            try {
                btn.disabled = true;
                btn.innerText = "جاري إنشاء الحساب...";
                loader.style.display = 'flex';

                // 1. الطلب الوحيد (الـ Trigger سيتكفل بالباقي في السيرفر)
                const stateName = wilayas.find(w => w.id == stateId)?.name || null;
                const { data, error: authError } = await window.sb.auth.signUp({
                    email: email,
                    password: pass,
                    options: {
                        data: {
                            full_name: name,
                            role: currentRole, // 'user', 'individual', 'publisher', etc.
                            phone: phone,
                            state: stateName,
                            municipality: muni
                        }
                    }
                });

                if (authError) throw authError;

                alert("تم التسجيل بنجاح! سيتم إنشاء بروفايلك آلياً. يرجى مراجعة بريدك الإلكتروني لتفعيل الحساب.");
                window.location.href = 'login.html';

            } catch (err) {
                alert("خطأ: " + err.message);
                console.error(err);
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
                btn.innerHTML = 'انضم الآن <i class="fas fa-user-plus"></i>';
            }
        }

        document.addEventListener('DOMContentLoaded', initStates);
    </script>
</body>

</html>
